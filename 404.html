    <style>
    body {
        background-color: #F2F2F2;
    }

    a.brand {
        color: #08c;
    }

    a.brand:hover {
        color: #fa3 !important;
    }

    .panel h5 {
        color: #08C;
    }

    .panel p {
        color: #666;
    }

    .panel {
        background-color: #FFF;
        border: 1px solid #DDD;
        border-radius: 3px;
        border-top: 1px solid #EEE;
    }

    .panel:hover > p {;
    }

    .panel:hover {
        border-right: 4px solid #777;
        -moz-box-shadow: 0px 4px 0px #ccc; /* Firefox 3.6 and earlier */
        -webkit-box-shadow: 0px 4px 0px #ccc; /* Safari and Chrome */
        box-shadow: 0px 4px 0px #ccc;
        background: #ffffff; /* Old browsers */
        background: -moz-linear-gradient(top, #ffffff 0%, #ffffaa 100%); /* FF3.6+ */
        background: -webkit-gradient(linear, left top, left bottom, color-stop(0%,#ffffff), color-stop(100%,#ffffaa)); /* Chrome,Safari4+ */
        background: -webkit-linear-gradient(top,    #ffffff 0%,#ffffaa 100%); /* Chrome10+,Safari5.1+ */
        background: -o-linear-gradient(top,    #ffffff 0%,#ffffaa 100%); /* Opera 11.10+ */
        background: -ms-linear-gradient(top,    #ffffff 0%,#ffffaa 100%); /* IE10+ */
        background: linear-gradient(to bottom,    #ffffff 0%,#ffffaa 100%); /* W3C */
        filter: progid:DXImageTransform.Microsoft.gradient( startColorstr='#ffffff', endColorstr='#ffffaa',GradientType=0 ); /* IE6-9 */
    }

    #myCanvas {
        position: absolute;
        z-index: -100;
    }
    
    .slides_right {
        position: relative;
        left: 0px;
        -webkit-transition: left 5s ease-in-out;
        -moz-transition: left 5s ease-in-out;
        -o-transition: left 5s ease-in-out;
        transition: left 5s ease-in-out;
    }
    
    .slides_right:hover {
        left: 50%;
        -webkit-transition: left 5s ease-in-out;
        -moz-transition: left 5s ease-in-out;
        -o-transition: left 5s ease-in-out;
        transition: left 5s ease-in-out;
    }
    
    </style>
